name: Run Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run migrations (direct connection)
        run: |
          DB="postgresql://postgres:IHuRNqhaZ87zaAab@db.iyjxsdxebxmbrrquxbnw.supabase.co:5432/postgres?sslmode=require"
          echo "=== Schema migration ==="
          psql "$DB" -f apps/web/supabase/migrations/001_initial_schema.sql 2>&1
          echo "=== Seed migration ==="
          psql "$DB" -f apps/web/supabase/migrations/002_seed.sql 2>&1

      - name: Verify tables and data
        run: |
          DB="postgresql://postgres:IHuRNqhaZ87zaAab@db.iyjxsdxebxmbrrquxbnw.supabase.co:5432/postgres?sslmode=require"
          psql "$DB" -c "
            SELECT 'products' AS tbl, COUNT(*) FROM products
            UNION ALL
            SELECT 'categories', COUNT(*) FROM categories
            UNION ALL
            SELECT 'kayak_sizes', COUNT(*) FROM kayak_sizes;
          " 2>&1
