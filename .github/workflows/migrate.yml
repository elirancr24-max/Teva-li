name: Run Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Test connection (direct)
        continue-on-error: true
        run: |
          timeout 10 psql \
            "postgresql://postgres:IHuRNqhaZ87zaAab@db.iyjxsdxebxmbrrquxbnw.supabase.co:5432/postgres?sslmode=require" \
            -c "SELECT 'direct OK';" 2>&1

      - name: Test connection (pooler)
        continue-on-error: true
        run: |
          timeout 15 psql \
            "postgresql://postgres.iyjxsdxebxmbrrquxbnw:IHuRNqhaZ87zaAab@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -c "SELECT 'pooler OK';" 2>&1

      - name: Run schema migration (direct)
        id: migrate_direct
        continue-on-error: true
        run: |
          timeout 30 psql \
            "postgresql://postgres:IHuRNqhaZ87zaAab@db.iyjxsdxebxmbrrquxbnw.supabase.co:5432/postgres?sslmode=require" \
            -f apps/web/supabase/migrations/001_initial_schema.sql 2>&1
          timeout 30 psql \
            "postgresql://postgres:IHuRNqhaZ87zaAab@db.iyjxsdxebxmbrrquxbnw.supabase.co:5432/postgres?sslmode=require" \
            -f apps/web/supabase/migrations/002_seed.sql 2>&1

      - name: Run schema migration (pooler fallback)
        if: steps.migrate_direct.outcome == 'failure'
        run: |
          timeout 30 psql \
            "postgresql://postgres.iyjxsdxebxmbrrquxbnw:IHuRNqhaZ87zaAab@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -f apps/web/supabase/migrations/001_initial_schema.sql 2>&1
          timeout 30 psql \
            "postgresql://postgres.iyjxsdxebxmbrrquxbnw:IHuRNqhaZ87zaAab@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -f apps/web/supabase/migrations/002_seed.sql 2>&1

      - name: Verify tables exist
        run: |
          psql \
            "postgresql://postgres:IHuRNqhaZ87zaAab@db.iyjxsdxebxmbrrquxbnw.supabase.co:5432/postgres?sslmode=require" \
            -c "SELECT COUNT(*) AS products FROM products; SELECT COUNT(*) AS kayak_sizes FROM kayak_sizes;" 2>&1 || \
          psql \
            "postgresql://postgres.iyjxsdxebxmbrrquxbnw:IHuRNqhaZ87zaAab@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -c "SELECT COUNT(*) AS products FROM products; SELECT COUNT(*) AS kayak_sizes FROM kayak_sizes;" 2>&1
