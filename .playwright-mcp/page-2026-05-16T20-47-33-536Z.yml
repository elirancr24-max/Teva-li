    - paragraph [ref=e41]: שש שנים אחר כך, אנחנו עדיין בוחרים כל פרי ביד. עדיין מכירים את הלקוחות שלנו בשם. עדיין מתעוררים לפני הזריחה כדי להגיע לחקלאים. אבל היום אפשר להזמין גם דרך האתר, וזה מגיע אליכם הביתה — ארוז, חתוך, מוכן. עם אותה תשומת לב שאבא נתן לאבטיח הראשון.
