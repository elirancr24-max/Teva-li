<style>
/* פרי לי — Design System */

:root {
  /* Core palette */
  --ink: #0a0a0a;
  --paper: #fdfbf5;
  --paper-2: #f4efe2;
  --line: #1a1a1a;

  /* Fruit accents — saturated, bold */
  --citrus: #FFD60A;       /* lemon / pineapple */
  --watermelon: #FF4D6D;   /* watermelon pink */
  --leaf: #1F8A5B;         /* fresh green */
  --berry: #6B1F3A;        /* deep berry */
  --tangerine: #FF7A1A;    /* mango / orange */

  /* Typography stacks */
  --display: "Heebo", "Assistant", system-ui, sans-serif;
  --serif: "Frank Ruhl Libre", "David Libre", Georgia, serif;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
  --body: "Assistant", "Heebo", system-ui, sans-serif;

  --radius: 0px;
  --radius-soft: 8px;

  --easing: cubic-bezier(.2,.7,.2,1);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--body);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; cursor: pointer; }

/* Utility */
.mono { font-family: var(--mono); letter-spacing: -0.01em; }
.serif { font-family: var(--serif); }
.display { font-family: var(--display); font-weight: 900; letter-spacing: -0.04em; line-height: 0.9; }

/* Generic grid line */
.hairline { border-top: 1px solid var(--ink); }

/* Sticker / label like the shop labels */
.sticker {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--citrus);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-radius: 999px;
}

/* Big square button */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 28px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--display);
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.01em;
  border: 2px solid var(--ink);
  text-decoration: none;
  position: relative;
  box-shadow: 4px 4px 0 var(--ink);
  transition: transform 160ms var(--easing), box-shadow 160ms var(--easing), background 160ms;
  cursor: pointer;
}
.btn:hover { transform: translate(-3px, -3px); box-shadow: 7px 7px 0 var(--ink); }
.btn:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0 var(--ink); }
.btn.primary { background: var(--watermelon); color: var(--ink); border-color: var(--ink); }
.btn.citrus { background: var(--citrus); color: var(--ink); }
.btn.outline { background: var(--paper); color: var(--ink); }
.btn.ghost { background: transparent; color: inherit; border-color: currentColor; box-shadow: 4px 4px 0 currentColor; }
.btn.ghost:hover { box-shadow: 7px 7px 0 currentColor; }

/* Fruit illustrations (CSS shapes, no SVG hand-drawing) */
.fruit-blob {
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.3), transparent 50%),
    var(--blob-color, var(--watermelon));
  border-radius: 50%;
}

/* Striped placeholder for product photos */
.photo-placeholder {
  background:
    repeating-linear-gradient(135deg, var(--paper-2), var(--paper-2) 8px, var(--paper) 8px, var(--paper) 16px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  position: relative;
  overflow: hidden;
}

/* Marquee */
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(50%); }
}
.marquee {
  display: flex;
  white-space: nowrap;
  animation: marquee 40s linear infinite;
}
@keyframes marquee-reverse {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.marquee-rev {
  display: flex;
  white-space: nowrap;
  animation: marquee-reverse 50s linear infinite;
}

/* Grain overlay texture */
.grain {
  position: relative;
}
.grain::after {
  content: '';
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0.06;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}

/* Halftone dot pattern */
.halftone {
  background-image: radial-gradient(circle, var(--ink) 1px, transparent 1.5px);
  background-size: 8px 8px;
}

/* Pulse dot */
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}
.pulse-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #1F8A5B;
  animation: pulse-dot 1.6s ease-in-out infinite;
}

/* Slow rotate for fruit-around-circle */
@keyframes spin-slow {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}
.spin-slow { animation: spin-slow 60s linear infinite; }

/* Hover lift */
.lift { transition: transform 200ms var(--easing), box-shadow 200ms; }
.lift:hover { transform: translate(-3px, -3px); box-shadow: 6px 6px 0 var(--ink); }

/* Underline draw */
.underline-draw {
  background: linear-gradient(currentColor, currentColor) no-repeat;
  background-size: 0% 2px;
  background-position: 0 100%;
  transition: background-size 300ms var(--easing);
}
.underline-draw:hover { background-size: 100% 2px; }

/* Text outline */
.outline-text {
  -webkit-text-stroke: 2px var(--ink);
  color: transparent;
}

/* Scrollbar inside artboards */
.artboard-scroll {
  overflow: hidden;
}

/* ───────────────────────────────────────────────
   Depth & shadow utilities (added in upgrade)
   ─────────────────────────────────────────────── */

/* Hard offset shadows — brutalist depth */
.shadow-1 { box-shadow: 4px 4px 0 var(--ink); }
.shadow-2 { box-shadow: 8px 8px 0 var(--ink); }
.shadow-3 { box-shadow: 12px 12px 0 var(--ink); }
.shadow-pop { box-shadow: 6px 6px 0 var(--ink), 0 12px 28px -10px rgba(0,0,0,0.25); }
.shadow-soft { box-shadow: 0 18px 40px -16px rgba(10,10,10,0.18), 0 4px 10px -4px rgba(10,10,10,0.08); }
.shadow-paper { box-shadow: 6px 6px 0 var(--paper-2), 8px 8px 0 var(--ink); }

/* Card lift with hard shadow appearing on hover */
.card-lift {
  transition: transform 220ms var(--easing), box-shadow 220ms var(--easing);
  box-shadow: 0 0 0 var(--ink);
  will-change: transform;
}
.card-lift:hover {
  transform: translate(-4px, -4px);
  box-shadow: 8px 8px 0 var(--ink);
}

/* Subtle 3D tilt utilities */
.tilt-l { transform: rotate(-2deg); }
.tilt-r { transform: rotate(2deg); }
.tilt-l-strong { transform: rotate(-5deg); }
.tilt-r-strong { transform: rotate(5deg); }

/* Float / breathing animations */
@keyframes float-y {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes float-tilt {
  0%, 100% { transform: rotate(-6deg) translateY(0); }
  50% { transform: rotate(-4deg) translateY(-8px); }
}
.float-y { animation: float-y 5s ease-in-out infinite; }
.float-tilt { animation: float-tilt 6s ease-in-out infinite; }

/* Halo / radial glow behind images */
.halo-accent {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 55%, var(--halo-color, var(--watermelon)) 0%, transparent 55%);
  filter: blur(40px);
  opacity: 0.55;
  pointer-events: none;
  z-index: 0;
}

/* Stripe / scan-line backgrounds */
.stripes-soft {
  background-image: repeating-linear-gradient(
    45deg,
    rgba(0,0,0,0.04) 0 2px,
    transparent 2px 12px
  );
}
.stripes-warning {
  background-image: repeating-linear-gradient(
    -45deg,
    var(--ink) 0 14px,
    var(--citrus) 14px 28px
  );
}

/* Outline numerals — sit behind hero type */
.outline-numeral {
  font-family: var(--display);
  font-weight: 900;
  -webkit-text-stroke: 1.5px var(--ink);
  color: transparent;
  letter-spacing: -0.06em;
  line-height: 0.8;
  user-select: none;
}

/* Underline that draws on first paint */
@keyframes draw-line {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}
.draw-line {
  display: inline-block;
  height: 6px;
  background: var(--watermelon);
  transform-origin: right center;
  animation: draw-line 900ms var(--easing) 200ms both;
}

/* Magnetic chip (filter pills) */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 8px 14px;
  border: 1.5px solid var(--ink);
  border-radius: 999px;
  background: var(--paper);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  transition: transform 200ms var(--easing), background 160ms, color 160ms, box-shadow 200ms;
  box-shadow: 2px 2px 0 var(--ink);
  cursor: pointer;
}
.chip:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); }
.chip.active { background: var(--ink); color: var(--paper); }

/* Animated dotted divider */
.dotted-divider {
  background-image: radial-gradient(circle, var(--ink) 1.5px, transparent 1.6px);
  background-size: 14px 6px;
  background-repeat: repeat-x;
  background-position: center;
  height: 6px;
}

/* Marquee fade edges */
.marquee-mask {
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 6%, black 94%, transparent 100%);
          mask-image: linear-gradient(90deg, transparent 0%, black 6%, black 94%, transparent 100%);
}

/* Accent ring — thin radiating circle for badges */
.ring-accent {
  position: relative;
}
.ring-accent::before {
  content: "";
  position: absolute;
  inset: -8px;
  border: 1.5px solid var(--ink);
  border-radius: inherit;
  opacity: 0.35;
  pointer-events: none;
}

/* Reveal-on-scroll baseline */
@keyframes rise-in {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.rise { animation: rise-in 700ms var(--easing) both; }
.rise-d1 { animation: rise-in 700ms var(--easing) 80ms both; }
.rise-d2 { animation: rise-in 700ms var(--easing) 160ms both; }
.rise-d3 { animation: rise-in 700ms var(--easing) 240ms both; }

/* Big watermark text behind sections */
.watermark {
  position: absolute;
  font-family: var(--display);
  font-weight: 900;
  letter-spacing: -0.06em;
  -webkit-text-stroke: 1.5px currentColor;
  color: transparent;
  pointer-events: none;
  user-select: none;
  white-space: nowrap;
  opacity: 0.08;
  z-index: 0;
}

/* Product price tag */
.price-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--display);
  font-weight: 900;
  font-size: 18px;
  border: 2px solid var(--ink);
  letter-spacing: -0.02em;
}
.price-tag.accent { background: var(--citrus); color: var(--ink); }

/* Frame around image (editorial) */
.image-frame {
  position: relative;
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 14px;
  box-shadow: 10px 10px 0 var(--ink);
}
.image-frame.dark {
  background: var(--ink);
  box-shadow: 10px 10px 0 rgba(253,251,245,0.12);
}

</style>
</head>

    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),
    0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;
    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

function IOSGlassPill({ children, dark = false, style = {} }) {

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {

  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});
</script>

<script type="text/babel">
/* shared.jsx — common pieces: fruits (CSS art), header, footer, sticker */
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- Fruit illustrations (CSS only) ---------- */

function PineappleArt({ size = 120 }) {

    <div style={{ width: size, height: size * 1.3, position: 'relative' }}>

        backgroundImage: 'repeating-linear-gradient(45deg, rgba(0,0,0,.18) 0 2px, transparent 2px 14px), repeating-linear-gradient(-45deg, rgba(0,0,0,.18) 0 2px, transparent 2px 14px)',

}

function WatermelonArt({ size = 120 }) {
  return (
    <div style={{
      width: size, height: size,
      borderRadius: '50%',
      background: `radial-gradient(circle at 50% 50%, var(--watermelon) 0 55%, #fff 55% 60%, var(--leaf) 60% 78%, #0a3d22 78% 100%)`,
      position: 'relative',
      overflow: 'hidden',
    }}>
      {[...Array(8)].map((_, i) => {
        const angle = (i / 8) * 360;
        const r = size * 0.18;
        const x = 50 + Math.cos(angle * Math.PI / 180) * 25;
        const y = 50 + Math.sin(angle * Math.PI / 180) * 25;
        return <div key={i} style={{
          position: 'absolute', left: `${x}%`, top: `${y}%`,
          width: 6, height: 10, background: '#0a0a0a',

      })}

}

function StrawberryArt({ size = 120 }) {
  return (
    <div style={{ width: size, height: size, position: 'relative' }}>
      <div style={{
        position: 'absolute', top: '-5%', left: '50%', transform: 'translateX(-50%)',
        width: size * 0.7, height: size * 0.3,
        background: 'var(--leaf)',
        clipPath: 'polygon(50% 100%, 0 30%, 20% 0, 35% 30%, 50% 0, 65% 30%, 80% 0, 100% 30%)',
      }} />
      <div style={{
        position: 'absolute', top: size * 0.2, left: 0,
        width: size, height: size * 0.85,

        backgroundImage: 'radial-gradient(circle at 30% 40%, #fff 2px, transparent 3px), radial-gradient(circle at 60% 30%, #fff 2px, transparent 3px), radial-gradient(circle at 50% 60%, #fff 2px, transparent 3px), radial-gradient(circle at 25% 70%, #fff 2px, transparent 3px), radial-gradient(circle at 75% 65%, #fff 2px, transparent 3px), radial-gradient(circle at 45% 30%, #fff 2px, transparent 3px)',
      }} />
    </div>
  );
}

function GrapeArt({ size = 120 }) {
  const positions = [
    [50, 20], [30, 35], [70, 35], [20, 55], [50, 50], [80, 55],
    [30, 70], [70, 70], [50, 80],
  ];
  return (
    <div style={{ width: size, height: size, position: 'relative' }}>
      {positions.map(([x, y], i) => (
        <div key={i} style={{
          position: 'absolute', left: `${x}%`, top: `${y}%`,
          width: size * 0.3, height: size * 0.3,
          background: `radial-gradient(circle at 30% 30%, #b794d4, var(--berry))`,
          borderRadius: '50%',
          transform: 'translate(-50%,-50%)',
        }} />
      ))}
      <div style={{
        position: 'absolute', top: 0, left: '52%',
        width: 4, height: size * 0.2, background: 'var(--leaf)',
      }} />
    </div>
  );
}

function MelonArt({ size = 120 }) {
  return (
    <div style={{
      width: size, height: size * 0.7,
      borderRadius: '50% 50% 50% 50% / 60% 60% 40% 40%',
      background: 'linear-gradient(180deg, #FFB347 0 40%, var(--tangerine) 40% 100%)',
      position: 'relative',
      overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: 'repeating-linear-gradient(0deg, transparent 0 8px, rgba(0,0,0,.08) 8px 9px)',
      }} />
    </div>
  );
}

function KiwiArt({ size = 120 }) {
  return (
    <div style={{
      width: size, height: size,
      borderRadius: '50%',
      background: `radial-gradient(circle at 50% 50%, #fff 0 8%, #c9e26b 8% 70%, #8b6f3a 70% 90%, #5c4626 90% 100%)`,
      position: 'relative',
      overflow: 'hidden',
    }}>
      {[...Array(12)].map((_, i) => {
        const angle = (i / 12) * 360;
        const x = 50 + Math.cos(angle * Math.PI / 180) * 22;
        const y = 50 + Math.sin(angle * Math.PI / 180) * 22;
        return <div key={i} style={{
          position: 'absolute', left: `${x}%`, top: `${y}%`,
          width: 4, height: 6, background: '#0a0a0a',
          borderRadius: '50%', transform: 'translate(-50%,-50%)',

}

const FRUIT_ART = {

  watermelon: WatermelonArt,
  strawberry: StrawberryArt,
  grape: GrapeArt,
  melon: MelonArt,
  kiwi: KiwiArt,
};

/* Real photos — Unsplash direct image URLs */
const FRUIT_PHOTOS = {

  strawberry: 'https://images.unsplash.com/photo-1543528176-61b239494933?w=400&h=400&fit=crop',
  grape: 'https://images.unsplash.com/photo-1599819177626-b06d7e5d80f4?w=400&h=400&fit=crop',

  kiwi: 'https://images.unsplash.com/photo-1610917040803-1fccf9623064?w=400&h=400&fit=crop',
};

function Fruit({ kind, size, photo = true }) {
  if (photo && FRUIT_PHOTOS[kind]) {
    return (
      <div style={{
        width: size, height: size,
        borderRadius: '50%',
        overflow: 'hidden',

        backgroundSize: 'cover',

  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center',

/* Logo: a citrus slice */
function Logo({ size = 44 }) {

}

function SiteFooter() {
  return (
    <footer style={{
      background: 'var(--ink)', color: 'var(--paper)',

    }}>
      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 40, marginBottom: 40 }}>
        <div>
          <div style={{ fontFamily: 'var(--display)', fontWeight: 900, fontSize: 64, letterSpacing: '-0.05em', lineHeight: 0.85 }}>פרי לי.</div>

        <span>FRESH · LOCAL · DIMONA</span>

}
function FooterCol({ title, items }) {

/* ---------- Section divider ---------- */
function SectionTag({ num, label }) {

    <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, fontFamily: 'var(--mono)', fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase' }}>

}

/* Export to window */
Object.assign(window, {
  Fruit, FRUIT_ART, FRUIT_PHOTOS, Sticker, SiteHeader, SiteFooter, Logo, SectionTag,
  PineappleArt, WatermelonArt, StrawberryArt, GrapeArt, MelonArt, KiwiArt,
});
</script>

                fontFamily: 'var(--serif)', fontSize: 16, lineHeight: 1.6, opacity: 0.85,

                )}
                {tab === 'origin' && (
                  <span>שוק העיר דימונה, ספק קבוע משנת 2018. נקטף בשעה 03:00 ועובר אצלנו במטבח עד 07:30. מקור: מטעים בערבה ובדרום.</span>

              <Spec label="משקל" value={product.weight} />
              <Spec label="טריות" value="היום" accent={accent} />

              <span style={{ fontFamily: 'var(--mono)', fontSize: 14, opacity: 0.55 }}>/ {product.weight}</span>
              <span style={{
                marginInlineStart: 'auto',
                padding: '6px 12px',
                background: accent, color: 'var(--ink)',
                fontFamily: 'var(--mono)', fontSize: 11, fontWeight: 700, letterSpacing: '0.1em',
                border: '1.5px solid var(--ink)',
              }}>חיסכון 12%</span>
            </div>

            <div style={{ display: 'flex', gap: 12, alignItems: 'stretch' }}>
              <div style={{
                display: 'flex',
                border: '2px solid var(--ink)',
                background: 'var(--paper)',
                boxShadow: '3px 3px 0 var(--ink)',
              }}>
                <button
                  onClick={() => setQty(Math.max(1, qty - 1))}
                  style={{
                    background: 'transparent', border: 'none',
                    padding: '0 18px',
                    fontSize: 24, fontWeight: 900,
                    fontFamily: 'var(--display)',
                    cursor: 'pointer',
                  }}
                >−</button>
                <div style={{
                  padding: '14px 20px', minWidth: 56, textAlign: 'center',
                  fontFamily: 'var(--display)', fontWeight: 900, fontSize: 22,
                  borderRight: '2px solid var(--ink)', borderLeft: '2px solid var(--ink)',
                }}>{qty}</div>
                <button
                  onClick={() => setQty(qty + 1)}
                  style={{
                    background: 'transparent', border: 'none',
                    padding: '0 18px',
                    fontSize: 24, fontWeight: 900,
                    fontFamily: 'var(--display)',
                    cursor: 'pointer',
                  }}
                >+</button>
              </div>
              <button className="btn primary" style={{ background: accent, flex: 1, fontSize: 16 }}>
                הוסף לסל · ₪{(product.price * qty).toFixed(2)}
              </button>
            </div>

            <div style={{
              fontFamily: 'var(--mono)', fontSize: 11,
              marginTop: 18, paddingTop: 14, borderTop: '1px dashed rgba(0,0,0,0.2)',
              display: 'flex', flexWrap: 'wrap', gap: 16,
              letterSpacing: '0.06em', opacity: 0.75,
            }}>
              <span>✓ משלוח חינם בדימונה</span>
              <span>✓ איסוף עצמי</span>
              <span>✓ הזמנה עד 11:00</span>
            </div>
          </div>
        </div>
      </section>

      {/* REVIEWS */}
      <section style={{
        padding: '80px 40px',
        borderBottom: '2px solid var(--ink)',
        background: 'var(--paper)',
        position: 'relative', overflow: 'hidden',
      }}>
        <div className="watermark" style={{
          bottom: -40, left: -20,
          fontSize: 'clamp(180px, 22vw, 360px)',
          color: 'var(--ink)',
        }}>★★★★★</div>

        <div style={{ position: 'relative', zIndex: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 40, flexWrap: 'wrap', gap: 24 }}>
          <div>
            <SectionTag num="02" label="מה אומרים על המוצר" />
            <h2 className="display" style={{
              fontSize: 'clamp(50px, 7vw, 100px)',
              margin: '18px 0 0', lineHeight: 0.9, letterSpacing: '-0.05em',
            }}>
              {product.reviews} <span style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontWeight: 400, color: accent }}>ביקורות</span>
            </h2>
          </div>
          <div style={{
            padding: '20px 26px',
            background: accent, color: 'var(--ink)',
            border: '2px solid var(--ink)',
            boxShadow: '6px 6px 0 var(--ink)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
          }}>
            <div style={{ fontFamily: 'var(--display)', fontWeight: 900, fontSize: 48, letterSpacing: '-0.04em', lineHeight: 1 }}>{product.rating}</div>
            <div style={{ display: 'flex', gap: 2, fontSize: 14 }}>★★★★★</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase' }}>{product.reviews} ביקורות</div>
          </div>
        </div>

        <div style={{ position: 'relative', zIndex: 1, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
          {[
            { q: 'הכי טעים שאכלתי. מתוק בלי שהוסיפו סוכר. הילדים מתים על זה.', a: 'מירב', r: '4 ימים', stars: 5 },
            { q: 'אננס ענק ויפה, חתיכות אחידות, מקרר עד שמגיעים. שווה כל שקל.', a: 'אבי', r: 'שבוע', stars: 5 },
            { q: 'הזמנתי 3 קופסאות לעבודה — נגמרו תוך שעה. אזמין עוד.', a: 'תהילה', r: '2 שבועות', stars: 5 },
          ].map((r, i) => <ReviewCard key={i} review={r} accent={accent} idx={i} />)}
        </div>
      </section>

      {/* CROSS-SELL */}
      <section style={{
        padding: '80px 40px',
        borderBottom: '2px solid var(--ink)',
        position: 'relative', overflow: 'hidden',
      }}>
        <div className="watermark" style={{
          top: 30, right: -30,
          fontSize: 'clamp(160px, 20vw, 320px)',
          color: 'var(--ink)',
        }}>MORE</div>

        <div style={{ position: 'relative', zIndex: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 30, flexWrap: 'wrap', gap: 16 }}>
          <div>
            <SectionTag num="03" label="קונים אצלנו גם" />
            <h2 className="display" style={{
              fontSize: 'clamp(50px, 7vw, 100px)',
              margin: '16px 0 0', lineHeight: 0.9, letterSpacing: '-0.05em',
            }}>
              ימשיך טוב<span style={{ color: accent }}>.</span>
            </h2>
          </div>
          <a style={{
            fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 700, letterSpacing: '0.1em',
            textTransform: 'uppercase', textDecoration: 'underline', textUnderlineOffset: 4,
          }}>כל הקטלוג ↘</a>
        </div>

        <div style={{ position: 'relative', zIndex: 1, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
          {ALL_PRODUCTS.slice(1, 5).map((p) => (
            <CatalogCard key={p.id} product={p} accent={accent} />
          ))}
        </div>
      </section>

      <SiteFooter />
    </div>
  );
}

function ReviewCard({ review, accent, idx }) {
  const [hover, setHover] = React.useState(false);
  const tilt = idx % 2 === 0 ? -0.6 : 0.6;
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        padding: '28px 26px 22px',
        background: 'var(--paper)',
        border: '1.5px solid var(--ink)',
        position: 'relative',
        transition: 'all 260ms var(--easing)',
        transform: hover ? 'translate(-3px, -3px) rotate(0deg)' : `translate(0,0) rotate(${tilt}deg)`,
        boxShadow: hover ? '8px 8px 0 var(--ink)' : '4px 4px 0 var(--ink)',
      }}
    >
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <div style={{ display: 'flex', gap: 3, color: accent, fontSize: 14 }}>
          {Array.from({ length: review.stars }).map((_, i) => <span key={i}>★</span>)}
        </div>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 10, opacity: 0.5, letterSpacing: '0.14em' }}>{review.r}</div>
      </div>

      <div style={{ fontFamily: 'var(--serif)', fontSize: 18, lineHeight: 1.5 }}>"{review.q}"</div>

      <div style={{
        marginTop: 18, paddingTop: 14, borderTop: '1px dashed rgba(0,0,0,0.2)',
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <div style={{
          width: 32, height: 32, background: accent,
          border: '1.5px solid var(--ink)',
          borderRadius: '50%',
          display: 'grid', placeItems: 'center',
          fontFamily: 'var(--display)', fontWeight: 900, fontSize: 13,
        }}>{review.a[0]}</div>
        <div style={{ fontFamily: 'var(--display)', fontWeight: 800, fontSize: 14 }}>{review.a}</div>
      </div>
    </div>
  );
}

function Spec({ label, value, accent }) {
  return (
    <div>
      <div style={{
        fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.16em',
        textTransform: 'uppercase', opacity: 0.5,
      }}>{label}</div>
      <div style={{
        fontFamily: 'var(--display)', fontWeight: 800, fontSize: 22, marginTop: 4,
        color: accent || 'var(--ink)',
      }}>{value}</div>
    </div>
  );
}

Object.assign(window, { ShopPage, ProductPage, ALL_PRODUCTS, CatalogCard });
</script>

<script type="text/babel">
/* kayak.jsx — קונפיגורטור קיאק אינטראקטיבי */

const KAYAK_SIZES = [
  { id: 'S', label: 'S', guests: '8-12', price: 380, w: 320, h: 100 },
  { id: 'M', label: 'M', guests: '15-25', price: 620, w: 420, h: 120 },
  { id: 'L', label: 'L', guests: '30-50', price: 980, w: 540, h: 140 },
  { id: 'XL', label: 'XL', guests: '60+', price: 1450, w: 660, h: 160 },
];

const KAYAK_FRUITS = [
  { id: 'pineapple', name: 'אננס', kind: 'pineapple' },
  { id: 'watermelon', name: 'אבטיח', kind: 'watermelon' },
  { id: 'strawberry', name: 'תות', kind: 'strawberry' },
  { id: 'grape', name: 'ענבים', kind: 'grape' },
  { id: 'melon', name: 'מלון', kind: 'melon' },
  { id: 'kiwi', name: 'קיווי', kind: 'kiwi' },
];

const KAYAK_EXTRAS = [
  { id: 'choc', name: 'שוקולד מומס', price: 60 },
  { id: 'gran', name: 'גרנולה ביתית', price: 40 },
  { id: 'honey', name: 'דבש דימונה', price: 35 },
  { id: 'mint', name: 'נענע טרייה', price: 15 },
];

const EVENT_TYPES = ['חתונה', 'יום הולדת', 'בר/בת מצווה', 'אירוע עסקי', 'ברית', 'אחר'];

function KayakConfigurator({ accent = 'var(--watermelon)' }) {
  const [size, setSize] = useState('M');
  const [fruits, setFruits] = useState(['pineapple', 'watermelon', 'strawberry', 'grape']);
  const [extras, setExtras] = useState(['mint']);
  const [step, setStep] = useState(1);
  const [eventType, setEventType] = useState('חתונה');
  const [guests, setGuests] = useState(40);

  const sizeObj = KAYAK_SIZES.find(s => s.id === size);
  const extrasTotal = extras.reduce((sum, id) => sum + (KAYAK_EXTRAS.find(e => e.id === id)?.price || 0), 0);
  const total = sizeObj.price + extrasTotal;

  const toggleFruit = (id) => {
    setFruits(fruits.includes(id) ? fruits.filter(x => x !== id) : [...fruits, id]);
  };
  const toggleExtra = (id) => {
    setExtras(extras.includes(id) ? extras.filter(x => x !== id) : [...extras, id]);
  };

  return (
    <div style={{ background: 'var(--paper)', minHeight: '100%' }}>
      <SiteHeader active="kayak" />

      <section style={{ padding: '40px 40px 20px', borderBottom: '2px solid var(--ink)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
          <div>
            <SectionTag num="—" label="קונפיגורטור · בנה את הקיאק שלך" />
            <h1 className="display" style={{ fontSize: 'clamp(80px, 12vw, 200px)', margin: '20px 0 0' }}>
              בנה <span style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontWeight: 400, color: accent }}>קיאק.</span>
            </h1>
          </div>
          <StepIndicator step={step} />
        </div>
      </section>

      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', minHeight: 700 }}>
        {/* Live preview */}
        <div style={{
          background: 'var(--paper-2)',
          borderLeft: '2px solid var(--ink)',
          padding: 60,
          display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
          position: 'relative', overflow: 'hidden',
        }}>
          {/* grid pattern */}
          <div style={{
            position: 'absolute', inset: 0,
            backgroundImage: 'linear-gradient(var(--ink) 1px, transparent 1px), linear-gradient(90deg, var(--ink) 1px, transparent 1px)',
            backgroundSize: '40px 40px',
            opacity: 0.04,
          }} />

          <div style={{ display: 'flex', justifyContent: 'space-between', position: 'relative', fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', opacity: 0.6 }}>
            <span>תצוגה חיה · {size} · {fruits.length} פירות</span>
            <span>↻ עדכון מיידי</span>
          </div>

          <KayakPreview size={sizeObj} fruits={fruits} extras={extras} />

          <div style={{ display: 'flex', justifyContent: 'space-between', position: 'relative', fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.16em', opacity: 0.6 }}>
            <span>↤ {sizeObj.w}MM ↦</span>
            <span>גובה: {sizeObj.h}MM</span>
          </div>
        </div>

        {/* Controls */}
        <div style={{ padding: '40px 40px 0', display: 'flex', flexDirection: 'column', overflow: 'auto' }}>
          {/* Step 1: Size */}
          <ControlBlock num="01" title="גודל" expanded={step >= 1}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginTop: 16 }}>
              {KAYAK_SIZES.map(s => (
                <button key={s.id} onClick={() => setSize(s.id)} style={{
                  padding: '20px 12px',
                  background: size === s.id ? 'var(--ink)' : 'transparent',
                  color: size === s.id ? 'var(--paper)' : 'var(--ink)',
                  border: '2px solid var(--ink)',
                  fontFamily: 'var(--display)',
                  textAlign: 'center',
                  cursor: 'pointer',
                }}>
                  <div style={{ fontWeight: 900, fontSize: 32, lineHeight: 1 }}>{s.label}</div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 10, marginTop: 6, opacity: 0.7 }}>{s.guests} אורחים</div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 11, marginTop: 8, fontWeight: 700 }}>₪{s.price}</div>
                </button>
              ))}
            </div>
          </ControlBlock>

          {/* Step 2: Fruits */}
          <ControlBlock num="02" title="פירות" expanded={step >= 1}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, opacity: 0.6, marginBottom: 12, marginTop: 12 }}>
              נבחרו {fruits.length}/6 · כלולים במחיר
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
              {KAYAK_FRUITS.map(f => {
                const active = fruits.includes(f.id);
                return (
                  <button key={f.id} onClick={() => toggleFruit(f.id)} style={{
                    padding: '12px',
                    background: active ? accent : 'transparent',
                    border: '2px solid var(--ink)',
                    cursor: 'pointer',
                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
                    position: 'relative',
                  }}>
                    {active && <div style={{ position: 'absolute', top: 6, right: 6, width: 16, height: 16, background: 'var(--ink)', color: 'var(--paper)', fontSize: 11, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: '50%' }}>✓</div>}
                    <Fruit kind={f.kind} size={50} />
                    <div style={{ fontFamily: 'var(--display)', fontWeight: 800, fontSize: 14 }}>{f.name}</div>
                  </button>
                );
              })}
            </div>
          </ControlBlock>

          {/* Step 3: Extras */}
          <ControlBlock num="03" title="תוספות" expanded={step >= 1}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginTop: 12 }}>
              {KAYAK_EXTRAS.map(e => {
                const active = extras.includes(e.id);
                return (
                  <button key={e.id} onClick={() => toggleExtra(e.id)} style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '14px 16px',
                    background: active ? 'var(--ink)' : 'transparent',
                    color: active ? 'var(--paper)' : 'var(--ink)',
                    border: '2px solid var(--ink)',
                    cursor: 'pointer',
                    fontFamily: 'var(--display)', fontWeight: 700,
                  }}>
                    <span style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ width: 18, height: 18, border: `2px solid ${active ? 'var(--paper)' : 'var(--ink)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11 }}>{active ? '✓' : ''}</span>
                      {e.name}
                    </span>
                    <span style={{ fontFamily: 'var(--mono)', fontSize: 13 }}>+₪{e.price}</span>
                  </button>
                );
              })}
            </div>
          </ControlBlock>

          {/* Step 4: Event details */}
          <ControlBlock num="04" title="פרטי האירוע" expanded={true}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 12 }}>
              <Field label="סוג">
                <select value={eventType} onChange={e => setEventType(e.target.value)} style={inputStyle}>
                  {EVENT_TYPES.map(t => <option key={t}>{t}</option>)}
                </select>
              </Field>
              <Field label="מספר אורחים">
                <input type="number" value={guests} onChange={e => setGuests(+e.target.value)} style={inputStyle} />
              </Field>
              <Field label="תאריך"><input type="date" defaultValue="2026-06-15" style={inputStyle} /></Field>
              <Field label="שעה"><input type="time" defaultValue="19:00" style={inputStyle} /></Field>
              <Field label="כתובת" full><input placeholder="רחוב ועיר" style={inputStyle} /></Field>
              <Field label="הערה לשף" full><textarea placeholder="לדוגמה: בלי דובדבנים, יותר אננס" style={{ ...inputStyle, height: 60, resize: 'none' }} /></Field>
            </div>
          </ControlBlock>
        </div>
      </div>

      {/* Sticky bottom summary */}
      <section style={{
        background: 'var(--ink)', color: 'var(--paper)',
        padding: '24px 40px',
        display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr auto',
        gap: 24, alignItems: 'center',
      }}>
        <Summary label="גודל" value={`${size} · ${sizeObj.guests}`} />
        <Summary label="פירות" value={fruits.length + ' זנים'} />
        <Summary label="תוספות" value={extras.length ? extras.length + ' פריטים' : 'ללא'} />
        <Summary label="סה״כ" value={`₪${total}`} big />
        <button className="btn primary" style={{ background: accent, padding: '18px 40px' }}>
          המשך לתשלום ←
        </button>
      </section>

      <SiteFooter />
    </div>
  );
}

function StepIndicator({ step }) {
  return (
    <div style={{ display: 'flex', gap: 8, fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.1em' }}>
      {['גודל', 'פירות', 'תוספות', 'אירוע', 'תשלום'].map((s, i) => (
        <div key={i} style={{
          padding: '6px 12px',
          background: i + 1 <= step ? 'var(--ink)' : 'transparent',
          color: i + 1 <= step ? 'var(--paper)' : 'var(--ink)',
          border: '1.5px solid var(--ink)',
          fontWeight: 700,
        }}>{`0${i + 1}`} {s}</div>
      ))}
    </div>
  );
}

function ControlBlock({ num, title, children, expanded = true }) {
  return (
    <div style={{ borderBottom: '1px solid var(--ink)', padding: '24px 0' }}>

/* ---------- Live preview drawing ---------- */
function KayakPreview({ size, fruits, extras }) {
  // hash position based on fruit index, deterministic
  const positions = useMemo(() => {
    const w = size.w, h = size.h * 1.4;
    const pts = [];
    const fruitCount = Math.max(8, fruits.length * 4);
    for (let i = 0; i < fruitCount; i++) {
      const t = i / (fruitCount - 1);
      // distribute along ellipse interior
      const angle = (i * 137.5) % 360;
      const r = 0.3 + (i % 5) * 0.1;
      const x = 0.5 + Math.cos(angle * Math.PI / 180) * r * 0.4;
      const y = 0.5 + Math.sin(angle * Math.PI / 180) * r * 0.35;
      pts.push({
        x: x * 100,
        y: y * 100,
        kind: fruits[i % Math.max(fruits.length, 1)] || 'watermelon',
        size: 38 + (i % 3) * 8,
      });
    }
    return pts;
  }, [size.id, fruits.join(',')]);

  return (
    <div style={{
      flex: 1,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative',
      padding: '40px 0',
    }}>
      <div style={{
        width: size.w,
        height: size.h * 1.6,
        position: 'relative',
        transition: 'all 400ms var(--easing)',
      }}>
        {/* Outer kayak shape */}
        <div style={{
          position: 'absolute', inset: 0,
          background: '#1a1a1a',
          borderRadius: '50% / 50%',
          boxShadow: '0 30px 60px rgba(0,0,0,.25)',
        }} />
        {/* Inner tray */}
        <div style={{
          position: 'absolute', inset: '8% 4%',
          background: 'var(--paper)',
          borderRadius: '50% / 50%',
          overflow: 'hidden',
        }}>
          {fruits.length === 0 && (
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--mono)', fontSize: 12, opacity: 0.4 }}>
              בחרו פירות →
            </div>
          )}
          {positions.map((p, i) => {
            const Comp = FRUIT_ART[p.kind] || WatermelonArt;
            return (
              <div key={i} style={{
                position: 'absolute',
                left: `${p.x}%`, top: `${p.y}%`,
                transform: 'translate(-50%,-50%)',
                transition: 'all 500ms var(--easing)',
              }}>
                <Comp size={p.size} />
              </div>
            );
          })}
        </div>
        {/* Label */}
        <div style={{ position: 'absolute', bottom: -50, left: 20 }}>
          <Sticker color="var(--citrus)" rotate={-4}>פרי לי · {size.id}</Sticker>
        </div>
        {extras.length > 0 && (

            <Sticker color="var(--leaf)" rotate={6}>+ {extras.length} תוספות</Sticker>
          </div>
        )}
      </div>
    </div>
  );
}

<script type="text/babel">
/* app.jsx — main shell: top nav + screen switcher + tweaks */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "watermelon",
  "displayFont": "Heebo",
  "serifFont": "Frank Ruhl Libre",
  "btnStyle": "sharp",
  "heroVariant": "mega"
}/*EDITMODE-END*/;

const PALETTES = {
  watermelon: { accent: '#FF4D6D', label: 'אבטיח' },
  citrus:     { accent: '#FFD60A', label: 'הדרים' },
  leaf:       { accent: '#1F8A5B', label: 'עלה' },
  berry:      { accent: '#6B1F3A', label: 'יער' },
  tangerine:  { accent: '#FF7A1A', label: 'מנגו' },
};

const FONTS = {
  display: {
    Heebo: '"Heebo", system-ui, sans-serif',
    Assistant: '"Assistant", system-ui, sans-serif',
    Anek: '"Anek Hebrew", system-ui, sans-serif',
    Rubik: '"Rubik", system-ui, sans-serif',
  },
  serif: {
    'Frank Ruhl Libre': '"Frank Ruhl Libre", Georgia, serif',
    'David Libre': '"David Libre", Georgia, serif',
    'Noto Serif Hebrew': '"Noto Serif Hebrew", Georgia, serif',
  },
};

const SCREENS = [
  { id: 'home', label: 'דף בית', sub: 'דסקטופ' },
  { id: 'shop', label: 'קטלוג', sub: 'פירות קלופים' },
  { id: 'product', label: 'מוצר', sub: 'דף בודד' },
  { id: 'kayak', label: 'קונפיגורטור', sub: 'בנה קיאק' },
  { id: 'admin-dash', label: 'אדמין · בקרה', sub: 'KPI + מכירות' },
  { id: 'admin-products', label: 'אדמין · מוצרים', sub: 'הוסף / ערוך' },
  { id: 'admin-kayaks', label: 'אדמין · קיאקים', sub: 'אישור הזמנות' },
  { id: 'mobile', label: 'מובייל', sub: 'iPhone' },
  { id: 'brand', label: 'מערכת עיצוב', sub: 'מותג + טוקנים' },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState(() => {
    try { return localStorage.getItem('pl-screen') || 'home'; } catch { return 'home'; }
  });
  useEffect(() => { try { localStorage.setItem('pl-screen', screen); } catch {} }, [screen]);

  const palette = PALETTES[t.palette] || PALETTES.watermelon;
  const accent = palette.accent;

  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--display', FONTS.display[t.displayFont] || FONTS.display.Heebo);
    r.style.setProperty('--serif', FONTS.serif[t.serifFont] || FONTS.serif['Frank Ruhl Libre']);
    r.style.setProperty('--watermelon', palette.accent);
  }, [t.displayFont, t.serifFont, t.palette]);

  useEffect(() => {
    const styleId = '__btn_style';
    let s = document.getElementById(styleId);
    if (!s) { s = document.createElement('style'); s.id = styleId; document.head.appendChild(s); }
    const radius = t.btnStyle === 'pill' ? '999px' : t.btnStyle === 'soft' ? '8px' : '0px';
    s.textContent = `.btn, button.btn { border-radius: ${radius} !important; }`;
  }, [t.btnStyle]);

  return (
    <div style={{ minHeight: '100vh', background: '#1a1a1a' }}>
      <PreviewBar screen={screen} setScreen={setScreen} />
      <div style={{
        padding: '24px',
        display: 'flex',
        justifyContent: 'center',
      }}>
        <ScreenFrame screen={screen}>
          {renderScreen(screen, accent, t)}
        </ScreenFrame>
      </div>

      <TweaksPanel title="Tweaks · פרי לי">
        <TweakSection title="פלטת צבעים">
          <TweakColor
            label="צבע ראשי"
            value={t.palette}
            options={Object.keys(PALETTES).map(k => ({ value: k, color: PALETTES[k].accent, label: PALETTES[k].label }))}
            onChange={(v) => setTweak('palette', v)}
          />
        </TweakSection>
        <TweakSection title="טיפוגרפיה">
          <TweakSelect label="גופן ראשי" value={t.displayFont} options={Object.keys(FONTS.display)} onChange={(v) => setTweak('displayFont', v)} />
          <TweakSelect label="גופן סריף" value={t.serifFont} options={Object.keys(FONTS.serif)} onChange={(v) => setTweak('serifFont', v)} />
        </TweakSection>
        <TweakSection title="כפתורים">
          <TweakRadio label="סגנון" value={t.btnStyle} options={[{value:'sharp',label:'חד'},{value:'soft',label:'רך'},{value:'pill',label:'גלולה'}]} onChange={(v) => setTweak('btnStyle', v)} />
        </TweakSection>
        <TweakSection title="הירו (דף בית)">
          <TweakRadio label="וריאציה" value={t.heroVariant} options={[{value:'mega',label:'ענק'},{value:'split',label:'מפוצל'},{value:'editorial',label:'מגזין'}]} onChange={(v) => setTweak('heroVariant', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

        <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 1fr', gap: 24, marginBottom: 24 }}>
          <div style={{ border: '2px solid var(--ink)', padding: 24 }}>
            <SectionTag num="01" label="צבעים" />
            <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 0 }}>
              {[
                { c: '#0a0a0a', n: 'דיו' },
                { c: '#fdfbf5', n: 'נייר' },
                { c: accent, n: 'ראשי' },
                { c: '#FFD60A', n: 'הדר' },
                { c: '#1F8A5B', n: 'עלה' },
              ].map((s, i) => (
                <div key={i} style={{ aspectRatio: '1', background: s.c, border: '1px solid var(--ink)', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', padding: 8, color: ['#0a0a0a','#6B1F3A'].includes(s.c) ? '#fdfbf5' : '#0a0a0a' }}>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 9, fontWeight: 700 }}>{s.n}</div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 8, opacity: 0.6 }}>{s.c.toUpperCase()}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ border: '2px solid var(--ink)', padding: 24 }}>
            <SectionTag num="02" label="טיפוגרפיה" />
            <div style={{ marginTop: 12 }}>
              <div className="display" style={{ fontSize: 72, lineHeight: 0.9 }}>פרי</div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 9, opacity: 0.6 }}>HEEBO BLACK · 900</div>
            </div>
            <div style={{ marginTop: 16 }}>
              <div style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: 40 }}>טרי.</div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 9, opacity: 0.6 }}>FRANK RUHL · ITALIC</div>
            </div>
          </div>
          <div style={{ border: '2px solid var(--ink)', padding: 24 }}>
            <SectionTag num="03" label="סטיקרים" />
            <div style={{ marginTop: 24, display: 'flex', flexDirection: 'column', gap: 14, alignItems: 'flex-start' }}>
              <Sticker color="var(--citrus)" rotate={-6}>טרי 100%</Sticker>
              <Sticker color={accent} rotate={4}>הכי נמכר</Sticker>
              <Sticker color="var(--leaf)" rotate={-4}><span style={{ color: 'var(--paper)' }}>חדש</span></Sticker>
            </div>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24 }}>
          <div style={{ border: '2px solid var(--ink)', padding: 24 }}>
            <SectionTag num="04" label="כפתורים" />
            <div style={{ marginTop: 20, display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'flex-start' }}>
              <button className="btn primary" style={{ background: accent }}>הזמן עכשיו</button>
              <button className="btn">בנה קיאק</button>
              <button className="btn outline">קרא עוד →</button>
            </div>
          </div>
          <div style={{ border: '2px solid var(--ink)', padding: 24 }}>
            <SectionTag num="05" label="איקונים · פירות" />
            <div style={{ marginTop: 20, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, justifyItems: 'center' }}>
              <PineappleArt size={60} />
              <WatermelonArt size={60} />
              <StrawberryArt size={60} />
              <GrapeArt size={60} />
              <MelonArt size={60} />
              <KiwiArt size={60} />
            </div>
          </div>
          <div style={{ border: '2px solid var(--ink)', padding: 24, background: 'var(--ink)', color: 'var(--paper)' }}>
            <SectionTag num="06" label="טון דיבור" />
            <div style={{ marginTop: 20, fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: 22, lineHeight: 1.3 }}>
              "ב-3 בלילה אנחנו כבר בשוק. ב-7 בבוקר זה כבר על המדף."
            </div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, marginTop: 16, opacity: 0.5, letterSpacing: '0.1em' }}>ישיר · גאה · דימונאי</div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
